<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a18;
      min-height: 100vh;
      padding: 0;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e0;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 17px; font-weight: 600; color: #1a1a18; }
    .header-sub { font-size: 12px; color: #888; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    .dot-live { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
    .header-links { display: flex; gap: 8px; }
    .pill {
      font-size: 12px; padding: 5px 12px; border-radius: 8px;
      border: 1px solid #ddd; color: #555; text-decoration: none;
      background: #fff; cursor: pointer;
    }
    .pill:hover { background: #f5f5f0; }
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
    .sec-label {
      font-size: 11px; font-weight: 600; color: #999;
      letter-spacing: .07em; text-transform: uppercase;
      margin: 28px 0 10px;
    }
    .sec-label:first-child { margin-top: 0; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
    .kpi {
      background: #fff; border-radius: 10px;
      border: 1px solid #e8e8e3; padding: 14px 16px;
    }
    .kpi-lbl { font-size: 11px; color: #888; margin-bottom: 6px; }
    .kpi-val { font-size: 26px; font-weight: 600; color: #1a1a18; line-height: 1; }
    .kpi-sub { font-size: 11px; color: #aaa; margin-top: 5px; }
    .ret-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .ret-cell {
      background: #fff; border-radius: 10px;
      border: 1px solid #e8e8e3; padding: 16px; text-align: center;
    }
    .ret-pct { font-size: 28px; font-weight: 600; color: #1a1a18; }
    .ret-lbl { font-size: 12px; color: #888; margin-top: 4px; }
    .ret-desc { font-size: 11px; color: #aaa; margin-top: 2px; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .ccard {
      background: #fff; border-radius: 12px;
      border: 1px solid #e8e8e3; padding: 18px;
    }
    .ctitle { font-size: 13px; font-weight: 500; color: #1a1a18; margin-bottom: 14px; }
    .fcard {
      background: #fff; border-radius: 12px;
      border: 1px solid #e8e8e3; padding: 18px;
    }
    .fstep { margin-bottom: 12px; }
    .frow {
      display: flex; justify-content: space-between;
      font-size: 12px; color: #666; margin-bottom: 5px;
    }
    .fval { font-weight: 600; color: #1a1a18; }
    .fbar-bg { background: #f0f0eb; border-radius: 5px; height: 26px; overflow: hidden; }
    .fbar {
      height: 100%; border-radius: 5px;
      display: flex; align-items: center;
      padding: 0 10px; font-size: 11px; color: #555;
      transition: width 0.8s ease;
    }
    .tcard {
      background: #fff; border-radius: 12px;
      border: 1px solid #e8e8e3; overflow: hidden;
    }
    .utbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .utbl th {
      color: #888; font-weight: 500; padding: 11px 16px;
      border-bottom: 1px solid #e8e8e3; text-align: left;
      background: #fafafa; font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
    }
    .utbl td { padding: 10px 16px; border-bottom: 1px solid #f0f0eb; color: #1a1a18; }
    .utbl tr:last-child td { border-bottom: none; }
    .utbl tr:hover td { background: #fafaf8; }
    .badge {
      display: inline-block; padding: 3px 8px;
      border-radius: 5px; font-size: 10px; font-weight: 600;
    }
    .bg { background: #dcfce7; color: #15803d; }
    .bb { background: #dbeafe; color: #1d4ed8; }
    .bw { background: #fef9c3; color: #854d0e; }
    .loading {
      padding: 80px; text-align: center;
      color: #888; font-size: 14px;
    }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 2px solid #e0e0e0; border-top-color: #3266ad;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err {
      background: #fee2e2; color: #b91c1c;
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; margin-bottom: 12px;
    }
    .footer {
      font-size: 11px; color: #aaa;
      margin-top: 32px; padding-top: 16px;
      border-top: 1px solid #e8e8e3;
      text-align: center;
    }
    @media (max-width: 640px) {
      .header { padding: 14px 16px; }
      .container { padding: 20px 14px; }
      .charts-row, .ret-grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<script>

      day:'2-digit', month:'2-digit', year:'numeric',

async function qt(tbl) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${tbl}?select=*&limit=1000`, {
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Prefer': 'count=exact'
      }
    });
    if (!r.ok) return { data: null, count: 0 };
    const data = await r.json();
    const ct = r.headers.get('Content-Range');
    const count = ct ? parseInt(ct.split('/')[1]) || data.length : data.length;
    return { data, count };
  } catch (e) {
    return { data: null, count: 0 };
  }
}

async function tryTables(names) {
  for (const n of names) {
    const r = await qt(n);
    if (r.data && Array.isArray(r.data)) return r;
  }
  return { data: [], count: 0 };
}

function fmtDate(s) {
  if (!s) return '—';
  try {
    const d = new Date(s);
    return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  } catch { return s.slice(0, 10); }
}

function last14() {
  const d = [];
  for (let i = 13; i >= 0; i--) {
    const x = new Date(); x.setDate(x.getDate() - i);
    d.push(x.toISOString().slice(0, 10));
  }
  return d;
}

function groupByDay(items, field) {
  const g = {};
  (items || []).forEach(it => {
    const v = it[field]; if (!v) return;
    const k = v.toString().slice(0, 10);
    g[k] = (g[k] || 0) + 1;
  });
  return g;
}
